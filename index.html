<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>轨迹查询</title>
<style>
*{margin:0;padding:0;font:12px Verdana,Arial}
body{background:url(https://xxy819.github.io/track-website/images/bg.png);background-attachment:fixed}
.div_l{float:left;width:550px;height:200px}
.div_r1{float:left;margin-top:50px;width:300px;height:200px}
.div_f{width:100%;height:260px}
.div_con{width:1300px;margin:10px auto}
.content{width:1100px;margin:0 auto}
.menu_search{width:460px;height:100px;margin:20px 0 40px}
.search{width:250px;float:left;height:100px;border-radius:5px;border:2px solid #1291c5;resize:none;padding:5px;box-sizing:border-box;font-size:14px}
.input_search{float:left;width:90px;border-radius:5px;font-size:15px;height:50px;border:0;margin-top:20px;color:#fff;background:#1291c5;margin-left:20px;cursor:pointer}
.input_search:hover{background:#07bde4}
.div_canta{float:left;width:100%;margin-bottom:20px}
.div_tb_h{float:left;border:1px solid #dcddd7;width:100%;padding:10px 0;height:30px}
.danhao{float:left;width:300px;font-weight:600;margin-right:10px;color:#1d2088}
.hd{float:left;color:#F00;font-weight:600}
.egtrcak{float:left;width:100px;height:60px;margin:50px 0 0 90px}
.data-row{width:100%;float:left;margin-bottom:10px;border:1px solid #dcddd7}
.data-row .order-header{padding:6px 8px;background:#f0f5ff;font-weight:600;color:#1d2088;border-bottom:1px solid #dcddd7}
.data-row .order-info{padding:6px 8px;border-bottom:1px solid #dcddd7;background:#fff;line-height:1.8}
.data-row .order-info span{display:inline-block;margin-right:15px}
.data-row .order-info .label{color:#666}
.data-row .order-info .value{color:#333;font-weight:600}
.track-table{width:100%;border-collapse:collapse}
.track-table th,.track-table td{border:1px solid #dcddd7;padding:7px 8px;text-align:left;font-size:12px}
.track-table th{background:#ededed;font-weight:600}
.track-table tr:nth-child(even){background:#f9f9f9}
.no-data{text-align:center;padding:30px;color:#999;font-size:14px;border:1px solid #dcddd7;border-top:none}
.lang-bar{float:right;margin:10px 20px 0 0}
.lang-bar a{display:inline-block;padding:4px 10px;margin-left:5px;border:1px solid #1291c5;border-radius:3px;color:#1291c5;text-decoration:none;cursor:pointer;font-size:12px}
.lang-bar a.active{background:#1291c5;color:#fff}
.lang-bar a:hover{background:#07bde4;color:#fff}
</style></head><body>

<div class="div_f"><div class="div_con">
<div class="lang-bar"><a href="javascript:void(0)" class="active" onclick="sl('zh')">中文</a><a href="javascript:void(0)" onclick="sl('es')">Espanol</a><a href="javascript:void(0)" onclick="sl('pt')">Portugues</a></div>
<div class="div_l"><img src="https://xxy819.github.io/track-website/images/logo.png" width="500" height="250"></div>
<div class="div_r1"><div class="menu_search"><form onsubmit="dq();return false"><textarea cols="20" rows="5" class="search" id="cno" placeholder="请输入您的追踪号码"></textarea><button class="input_search" type="submit" id="bq">查询</button></form></div></div>
<div class="egtrcak"><a href="javascript:void(0)"><img src="https://xxy819.github.io/track-website/images/en.jpg"></a></div>
</div></div>

<div class="div_canta"><div class="content"><div class="div_con">
<div class="div_tb_h"><div class="danhao" id="tp">【】<span id="lsi">运单信息</span></div><div class="hd" id="tt"><span id="lt">第</span>【】<span id="lt2">票</span></div></div>
<div id="rb"><div class="no-data" id="lp">请输入追踪号码进行查询</div></div>
</div></div></div>

<script>
var L={zh:{t:'轨迹查询',q:'查询',p:'请输入您的追踪号码',si:'运单信息',ti:'第',t2:'票',pc:'件数',b:'批量查询',to:'共查询',f:'查到',nf:'未查到',rn:'参考号',tn:'跟踪号码',ds:'目的地',lt:'当地时间',st:'最新状态',rc:'收件人',nd:'请输入追踪号码进行查询',nm:'未找到该运单信息',ri:'收件人信息',tm:'时间',lo:'地点',dc:'状态描述'},es:{t:'Seguimiento',q:'Consultar',p:'Ingrese su número',si:'Información',ti:'Nº',t2:'',pc:'Bultos',b:'Consulta múltiple',to:'Total',f:'Encontrados',nf:'No encontrados',rn:'Referencia',tn:'Seguimiento',ds:'Destino',lt:'Hora local',st:'Estado',rc:'Destinatario',nd:'Ingrese su número',nm:'Envío no encontrado',ri:'Info destinatario',tm:'Fecha',lo:'Ubicación',dc:'Estado'},pt:{t:'Rastreio',q:'Pesquisar',p:'Insira o número',si:'Informação',ti:'Nº',t2:'',pc:'Volumes',b:'Consulta múltipla',to:'Total',f:'Encontrados',nf:'Não encontrados',rn:'Referência',tn:'Rastreio',ds:'Destino',lt:'Hora local',st:'Estado',rc:'Destinatário',nd:'Insira o número',nm:'Envio não encontrado',ri:'Info destinatário',tm:'Data',lo:'Local',dc:'Estado'}};
var cl='zh';function t(k){return L[cl][k]||k}
function sl(l){cl=l;document.title=t('t');document.getElementById('cno').placeholder=t('p');document.getElementById('bq').textContent=t('q');document.getElementById('lsi').textContent=t('si');document.getElementById('lt').textContent=t('ti');document.getElementById('lt2').textContent=t('t2');document.getElementById('lp').textContent=t('nd');var a=document.querySelectorAll('.lang-bar a');for(var i=0;i<a.length;i++)a[i].className='';a[cl==='zh'?0:cl==='es'?1:2].className='active';if(document.getElementById('cno').value.trim())dq()}
var D={'SBL063021215902':{refNo:'CRS001012238GZ',trackNo:'SBL063021215902',destination:'ES',localTime:'2026-07-05 18:35',status:'中转操作/等待配载',receiver:'Fernando Mendez',pieces:1,receiverInfo:{nome:'Fernando Mendez',pais:'Espana',cidade:'Salamanca',rua:'Calle Guadalajara, 6. Piso 3D',cep:'37003',telefone:'+34633176316'},records:[{time:'2026-07-05 18:35',location:'Frankfurt, DE',desc:'中转操作/等待配载'},{time:'2026-07-03 06:46',location:'Shanghai, CN',desc:'到达操作中心'},{time:'2026-06-30 11:20',location:'广州',desc:'货物已出运/运输中'},{time:'2026-06-29 17:30',location:'广州',desc:'出口报关完成'},{time:'2026-06-28 14:32',location:'深圳',desc:'货物已揽收'}]},'0082800082909724501148':{refNo:'LKSH062223458689',trackNo:'0082800082909724501148',destination:'PT',localTime:'2026-07-05 20:00',status:'清关中/海关查验中',receiver:'Raul Diniz Abreu Lopes',pieces:1,receiverInfo:{nome:'Raul Diniz Abreu Lopes',pais:'Portugal',cidade:'Viseu',rua:'Largo do Eiro N2, Moselos, Campo, Viseu',cep:'3515-298',telefone:'925634946'},records:[{time:'2026-07-05 20:00',location:'Lisboa, PT',desc:'清关中/海关查验中'},{time:'2026-06-29 10:00',location:'Lisboa, PT',desc:'清关中'},{time:'2026-06-27 06:00',location:'Frankfurt, DE',desc:'货物到达中转站'},{time:'2026-06-25 22:00',location:'广州',desc:'货物已出运'},{time:'2026-06-24 10:30',location:'深圳',desc:'货物已揽收'}]}};
function dq(){var i=document.getElementById('cno').value.trim();if(!i){alert(t('p'));return}var c=i.split(/[\n,，\s;；]+/).filter(function(x){return x.trim()});if(!c.length)return;var f=[],nf=[];for(var j=0;j<c.length;j++){var cd=c[j].trim(),dd=D[cd];if(dd)f.push({code:cd,data:dd});else nf.push(cd)}document.getElementById('tp').innerHTML='【'+t('b')+'】'+t('to')+c.length+t('pc');document.getElementById('tt').innerHTML=t('f')+f.length+t('pc')+'，'+t('nf')+nf.length+t('pc');var h='';if(!f.length){h='<div class="no-data">';for(var k=0;k<nf.length;k++)h+=nf[k]+' - '+t('nm')+'<br>';h+='</div>'}else{for(var n=0;n<f.length;n++){var d=f[n].data,cd=f[n].code;h+='<div class="data-row"><div class="order-header">'+cd+'</div><div class="order-info">';h+='<span><span class="label">'+t('rn')+':</span> <span class="value">'+(d.refNo||'-')+'</span></span>';h+='<span><span class="label">'+t('tn')+':</span> <span class="value">'+d.trackNo+'</span></span>';h+='<span><span class="label">'+t('ds')+':</span> <span class="value">'+d.destination+'</span></span>';h+='<span><span class="label">'+t('lt')+':</span> <span class="value">'+d.localTime+'</span></span>';h+='<span><span class="label">'+t('st')+':</span> <span class="value">'+d.status+'</span></span>';h+='<span><span class="label">'+t('rc')+':</span> <span class="value">'+(d.receiver||'-')+'</span></span>';h+='</div>';if(d.receiverInfo){var ri=d.receiverInfo;h+='<div class="order-info" style="background:#fafafa"><span class="label">'+t('ri')+':</span> '+ri.nome+' | '+ri.pais+' | '+ri.cidade+' | '+ri.rua+' | '+ri.cep+' | Tel:'+ri.telefone+'</div>'}if(d.records&&d.records.length){h+='<table class="track-table"><tr><th>'+t('tm')+'</th><th>'+t('lo')+'</th><th>'+t('dc')+'</th></tr>';for(var m=0;m<d.records.length;m++){var r=d.records[m];h+='<tr><td>'+r.time+'</td><td>'+r.location+'</td><td>'+r.desc+'</td></tr>'}h+='</table>'}h+='</div>'}if(nf.length)h+='<div class="no-data" style="margin-top:5px">'+t('nf')+'：'+nf.join('、')+'</div>'}document.getElementById('rb').innerHTML=h}
</script></body></html>
