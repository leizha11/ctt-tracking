<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>轨迹查询</title>
<style>
*{margin:0;padding:0;font:12px Verdana,Arial}
body{background:#eef1f5;background-attachment:fixed}
.div_l{float:left;width:550px;height:200px}
.div_r1{float:left;margin-top:50px;width:300px;height:200px}
.div_f{width:100%;height:260px}
.div_con{width:1300px;margin:10px auto}
.content{width:1100px;margin:0 auto}
.menu_search{width:460px;height:100px;margin:20px 0 40px}
.search{width:250px;float:left;height:100px;border-radius:5px;border:2px solid #1291c5;resize:none;padding:5px;box-sizing:border-box;font-size:14px}
.input_search{float:left;width:90px;border-radius:5px;font-size:15px;height:50px;border:0;margin-top:20px;color:#fff;background:#1291c5;margin-left:20px;cursor:pointer}
.input_search:hover{background:#07bde4}
.div_canta{float:left;width:100%;margin-bottom:20px}
.div_tb_h{float:left;border:1px solid #dcddd7;width:100%;padding:10px 0;height:30px}
.danhao{float:left;width:300px;font-weight:600;margin-right:10px;color:#1d2088}
.hd{float:left;color:#F00;font-weight:600}
.egtrcak{float:left;width:100px;height:60px;margin:50px 0 0 90px}
.data-row{width:100%;float:left;margin-bottom:10px;border:1px solid #dcddd7}
.data-row .order-header{padding:6px 8px;background:#f0f5ff;font-weight:600;color:#1d2088;border-bottom:1px solid #dcddd7}
.data-row .order-info{padding:6px 8px;border-bottom:1px solid #dcddd7;background:#fff;line-height:1.8}
.data-row .order-info span{display:inline-block;margin-right:15px}
.data-row .order-info .label{color:#666}
.data-row .order-info .value{color:#333;font-weight:600}
.track-table{width:100%;border-collapse:collapse}
.track-table th,.track-table td{border:1px solid #dcddd7;padding:7px 8px;text-align:left;font-size:12px}
.track-table th{background:#ededed;font-weight:600}
.track-table tr:nth-child(even){background:#f9f9f9}
.no-data{text-align:center;padding:30px;color:#999;font-size:14px;border:1px solid #dcddd7;border-top:none}
.lang-bar{float:right;margin:10px 20px 0 0}
.lang-bar a{display:inline-block;padding:4px 10px;margin-left:5px;border:1px solid #1291c5;border-radius:3px;color:#1291c5;text-decoration:none;cursor:pointer;font-size:12px}
.lang-bar a.active{background:#1291c5;color:#fff}
.lang-bar a:hover{background:#07bde4;color:#fff}
</style></head><body>

<div class="div_f"><div class="div_con">
<div class="lang-bar" id="langBar">
<a href="javascript:void(0)" class="active" onclick="switchLang('zh')">中文</a>
<a href="javascript:void(0)" onclick="switchLang('es')">Espanol</a>
<a href="javascript:void(0)" onclick="switchLang('pt')">Portugues</a>
</div>
<div class="div_l"><svg width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg"><circle cx="120" cy="125" r="90" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/><g transform="translate(70,65)"><path d="M0 40 L20 0 L90 40 L20 80 Z" fill="#0284c7" opacity="0.9"/><rect x="70" y="25" width="45" height="30" rx="4" fill="#0ea5e9"/><rect x="100" y="32" width="15" height="14" rx="2" fill="#fff" opacity="0.6"/></g><g transform="translate(245,105)"><rect x="0" y="0" width="65" height="55" rx="8" fill="#0ea5e9"/><rect x="0" y="0" width="65" height="18" rx="8" fill="#0284c7"/><text x="32" y="38" text-anchor="middle" font-size="20" font-weight="900" fill="#fff" font-family="Arial">CTT</text></g><g transform="translate(330,80)"><rect x="0" y="15" width="100" height="45" rx="6" fill="#0369a1"/><rect x="55" y="5" width="40" height="30" rx="5" fill="#0284c7"/><circle cx="25" cy="65" r="9" fill="#334155" stroke="#fff" stroke-width="2"/><circle cx="80" cy="65" r="9" fill="#334155" stroke="#fff" stroke-width="2"/><rect x="8" y="25" width="22" height="22" rx="4" fill="#fff" opacity="0.3"/></g><text x="250" y="225" text-anchor="middle" font-size="16" font-weight="700" fill="#0c4a6e" font-family="Arial" letter-spacing="4">CTT EXPRESS · 中国 → 西班牙</text></svg></div>
<div class="div_r1"><div class="menu_search">
<form onsubmit="doQuery();return false">
<textarea cols="20" rows="5" class="search" id="cno" placeholder="请输入您的追踪号码"></textarea>
<button class="input_search" type="submit" id="btnQuery">查询</button>
</form>
</div></div>
<div class="egtrcak"><a href="javascript:void(0)" style="display:block;width:80px;height:50px;background:linear-gradient(180deg,#012169 0%,#012169 50%,#fff 50%,#fff 100%);border:1px solid #ccc;border-radius:3px;position:relative;overflow:hidden;"><i style="position:absolute;top:0;left:0;width:30%;height:40%;background:#c8102e;transform:skewX(-20deg);transform-origin:0 0"></i><i style="position:absolute;top:50%;left:0;width:100%;height:40%;background:#c8102e"></i><i style="position:absolute;top:0;left:0;width:40%;height:30%;background:#c8102e;transform:skewY(-20deg);transform-origin:0 0"></i></a></div>
</div></div>

<div class="div_canta"><div class="content"><div class="div_con">
<div class="div_tb_h">
<div class="danhao" id="titlePrefix">【】<span id="lblShipInfo">运单信息</span></div>
<div class="hd" id="titleTicket"><span id="lblTicket">第</span>【】<span id="lblTicket2">票</span></div>
</div>
<div id="resultBody"><div class="no-data" id="lblPrompt">请输入追踪号码进行查询</div></div>
</div></div></div>

<script>
var L={zh:{title:'轨迹查询',query:'查询',placeholder:'请输入您的追踪号码',shipInfo:'运单信息',ticket:'第',ticket2:'票',pieces:'件数',batch:'批量查询',total:'共查询',found:'查到',notFound:'未查到',refNo:'参考号',trackNo:'跟踪号码',dest:'目的地',localTime:'当地时间',status:'最新状态',receiver:'收件人',noData:'请输入追踪号码进行查询',nf:'未找到该运单信息',ri:'收件人信息',time:'时间',location:'地点',desc:'状态描述'},es:{title:'Seguimiento',query:'Consultar',placeholder:'Ingrese su número',shipInfo:'Información',ticket:'Nº',ticket2:'',pieces:'Bultos',batch:'Consulta múltiple',total:'Total',found:'Encontrados',notFound:'No encontrados',refNo:'Referencia',trackNo:'Seguimiento',dest:'Destino',localTime:'Hora local',status:'Estado',receiver:'Destinatario',noData:'Ingrese su número',nf:'Envío no encontrado',ri:'Info destinatario',time:'Fecha',location:'Ubicación',desc:'Estado'},pt:{title:'Rastreio',query:'Pesquisar',placeholder:'Insira o número',shipInfo:'Informação',ticket:'Nº',ticket2:'',pieces:'Volumes',batch:'Consulta múltipla',total:'Total',found:'Encontrados',notFound:'Não encontrados',refNo:'Referência',trackNo:'Rastreio',dest:'Destino',localTime:'Hora local',status:'Estado',receiver:'Destinatário',noData:'Insira o número',nf:'Envio não encontrado',ri:'Info destinatário',time:'Data',location:'Local',desc:'Estado'}};
var cl='zh';function t(k){return L[cl][k]||k}
function switchLang(l){cl=l;document.title=t('title');document.getElementById('cno').placeholder=t('placeholder');document.getElementById('btnQuery').textContent=t('query');document.getElementById('lblShipInfo').textContent=t('shipInfo');document.getElementById('lblTicket').textContent=t('ticket');document.getElementById('lblTicket2').textContent=t('ticket2');document.getElementById('lblPrompt').textContent=t('noData');var a=document.querySelectorAll('#langBar a');for(var i=0;i<a.length;i++)a[i].className='';a[cl==='zh'?0:cl==='es'?1:2].className='active';if(document.getElementById('cno').value.trim())doQuery()}

var D={
'SBL063021215902':{refNo:'CRS001012238GZ',trackNo:'SBL063021215902',destination:'ES',localTime:'2026-07-05 18:35',status:'中转操作/等待配载',receiver:'Fernando Mendez',pieces:1,receiverInfo:{nome:'Fernando Mendez',pais:'Espana',cidade:'Salamanca',rua:'Calle Guadalajara, 6. Piso 3D',cep:'37003',telefone:'+34633176316'},records:[{time:'2026-07-05 18:35',location:'Frankfurt, DE',desc:'中转操作/等待配载'},{time:'2026-07-03 06:46',location:'Shanghai, CN',desc:'到达操作中心'},{time:'2026-06-30 11:20',location:'广州',desc:'货物已出运/运输中'},{time:'2026-06-29 17:30',location:'广州',desc:'出口报关完成'},{time:'2026-06-28 14:32',location:'深圳',desc:'货物已揽收'}]},
'0082800082909724501148':{refNo:'LKSH062223458689',trackNo:'0082800082909724501148',destination:'PT',localTime:'2026-07-05 20:00',status:'清关中/海关查验中',receiver:'Raul Diniz Abreu Lopes',pieces:1,receiverInfo:{nome:'Raul Diniz Abreu Lopes',pais:'Portugal',cidade:'Viseu',rua:'Largo do Eiro N2, Moselos, Campo, Viseu',cep:'3515-298',telefone:'925634946'},records:[{time:'2026-07-05 20:00',location:'Lisboa, PT',desc:'清关中/海关查验中'},{time:'2026-06-29 10:00',location:'Lisboa, PT',desc:'清关中'},{time:'2026-06-27 06:00',location:'Frankfurt, DE',desc:'货物到达中转站'},{time:'2026-06-25 22:00',location:'广州',desc:'货物已出运'},{time:'2026-06-24 10:30',location:'深圳',desc:'货物已揽收'}]}
};

function doQuery(){
var i=document.getElementById('cno').value.trim();
if(!i){alert(t('placeholder'));return}
var c=i.split(/[\n,，\s;；]+/).filter(function(x){return x.trim()});
if(!c.length)return;
var f=[],nf=[];
for(var j=0;j<c.length;j++){var cd=c[j].trim(),dd=D[cd];if(dd)f.push({code:cd,data:dd});else nf.push(cd)}
document.getElementById('titlePrefix').innerHTML='【'+t('batch')+'】'+t('total')+c.length+t('pieces');
document.getElementById('titleTicket').innerHTML=t('found')+f.length+t('pieces')+'，'+t('notFound')+nf.length+t('pieces');
var h='';
if(!f.length){h='<div class="no-data">';for(var k=0;k<nf.length;k++)h+=nf[k]+' - '+t('nf')+'<br>';h+='</div>'}
else{for(var n=0;n<f.length;n++){var d=f[n].data,cd=f[n].code;
h+='<div class="data-row"><div class="order-header">'+cd+'</div><div class="order-info">';
h+='<span><span class="label">'+t('refNo')+':</span> <span class="value">'+(d.refNo||'-')+'</span></span>';
h+='<span><span class="label">'+t('trackNo')+':</span> <span class="value">'+d.trackNo+'</span></span>';
h+='<span><span class="label">'+t('dest')+':</span> <span class="value">'+d.destination+'</span></span>';
h+='<span><span class="label">'+t('localTime')+':</span> <span class="value">'+d.localTime+'</span></span>';
h+='<span><span class="label">'+t('status')+':</span> <span class="value">'+d.status+'</span></span>';
h+='<span><span class="label">'+t('receiver')+':</span> <span class="value">'+(d.receiver||'-')+'</span></span>';
h+='</div>';
if(d.receiverInfo){var ri=d.receiverInfo;h+='<div class="order-info" style="background:#fafafa"><span class="label">'+t('ri')+':</span> '+ri.nome+' | '+ri.pais+' | '+ri.cidade+' | '+ri.rua+' | '+ri.cep+' | Tel:'+ri.telefone+'</div>'}
if(d.records&&d.records.length){h+='<table class="track-table"><tr><th>'+t('time')+'</th><th>'+t('location')+'</th><th>'+t('desc')+'</th></tr>';for(var m=0;m<d.records.length;m++){var r=d.records[m];h+='<tr><td>'+r.time+'</td><td>'+r.location+'</td><td>'+r.desc+'</td></tr>'}h+='</table>'}
h+='</div>'}
if(nf.length)h+='<div class="no-data" style="margin-top:5px">'+t('notFound')+'：'+nf.join('、')+'</div>'}
document.getElementById('resultBody').innerHTML=h
}
</script>
</body></html>
